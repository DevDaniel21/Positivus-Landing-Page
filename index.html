<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navigation-bar">
        <a href="#">
            <img class="logo" src="logo-black.png">
        </a>

        <div class="navbar-item">
            <a href="#" class="navbar-link">
                <h4>About us</h4>
            </a>
            <a href="#" class="navbar-link">
                <h4>Services</h4>
            </a>
            <a href="#" class="navbar-link">
                <h4>Use Cases</h4>
            </a>
            <a href="#" class="navbar-link">
                <h4>Pricing</h4>
            </a>
            <a href="#" class="navbar-link">
                <h4>Blog</h4>
            </a>
            <button class="button-secondary" disabled="disabled">Request a quote</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1>Navigating the digital landscape for success</h1>
            <h4>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including SEO, PPC, social media marketing, and content creation.</h4>
            <button disabled="disabled" class="button-primary">Book a consultation</button>
        </div>
        <img class="hero-image" src="hero-image.png">
    </header>

    <div class="companies">
        <img src="./img/companies/amazon.png" class="companies-logo">
        <img src="./img/companies/dribbble.png" class="companies-logo">
        <img src="./img/companies/hubspot.png" class="companies-logo">
        <img src="./img/companies/notion.png" class="companies-logo">
        <img src="./img/companies/netflix.png" class="companies-logo">
        <img src="./img/companies/zoom.png" class="companies-logo">
    </div>
</body>

</html>
